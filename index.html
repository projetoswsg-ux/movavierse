<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Moneroverse</title>
    <link rel="icon" href="https://moneroverse.com/Picsart_26-07-18_14-45-31-304.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            -webkit-tap-highlight-color: transparent;
        }
        .glow {
            text-shadow: 0 0 20px rgba(255, 102, 0, 0.5);
        }
        .neon-glow {
            animation: glow-pulse 3s infinite ease-in-out;
        }
        @keyframes glow-pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        .bg-gradient-radial {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        .select-all {
            user-select: all;
            -webkit-user-select: all;
            -moz-user-select: all;
        }

       
        .touch-optimized {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

    
        @media (max-width: 640px) {
            .mobile-full-width {
                width: 100%;
                justify-content: center;
            }
            .mobile-text-sm {
                font-size: 0.875rem;
            }
            .mobile-p-3 {
                padding: 12px;
            }
            
            .touch-target {
                min-height: 44px;
                min-width: 44px;
            }
        }

        .smooth-scroll {
            scroll-behavior: smooth;
        }

 
        .haptic-feedback:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="max-w-2xl w-full text-center space-y-8 md:space-y-12 px-4 sm:px-6">

        <div class="relative flex justify-center">
            <div class="absolute w-32 h-32 sm:w-40 sm:h-40 bg-orange-600 rounded-full blur-[60px] neon-glow"></div>
            <img src="https://moneroverse.com/Picsart_26-07-18_14-45-31-304.png" 
                 alt="Moneroverse Logo" 
                 class="w-32 h-auto sm:w-40 relative z-10 drop-shadow-2xl"
                 loading="lazy"
                 width="160"
                 height="auto">
        </div>

        <div class="space-y-3 sm:space-y-4">
            <h1 class="text-4xl sm:text-5xl md:text-7xl tracking-tighter glow">
                <span class="text-[#FF6600] font-thin">Monero</span>
                <span class="text-white font-medium">verse</span>
            </h1>
            <p class="text-gray-400 text-base sm:text-lg md:text-xl font-light px-2">
                The frontier of the Monero experience.<br>
                Support this initiative!
            </p>
        </div>

       
        <div class="space-y-2">
            <div class="flex items-center gap-2 bg-gray-900/50 backdrop-blur-sm border border-gray-800 p-2 rounded-xl max-w-2xl w-full hover:border-orange-500/30 transition-all duration-300">
                <code id="chaveCopiar" 
                      class="flex-1 text-xs sm:text-sm break-all text-gray-300 p-2 select-all font-mono touch-optimized"
                      style="word-break: break-all; overflow-wrap: break-word;">
                    84TDpkzas6CRSWQFiACWNThWbk5kCQJV4aRFaeM6cWuyFBPyL9tWiZrbLPL7u3azYYW7g6ctLFRbjUwb8hCwNREa6mbgfDU
                </code>
                <button onclick="copiarChave()" 
                        class="p-3 sm:p-2 hover:bg-gray-800 rounded-lg transition-all duration-300 group relative touch-target haptic-feedback flex-shrink-0"
                        title="Copiar"
                        aria-label="Copiar texto">
                    <svg class="w-5 h-5 sm:w-5 sm:h-5 text-gray-400 group-hover:text-orange-500 transition-all duration-300" 
                         fill="none" 
                         stroke="currentColor" 
                         viewBox="0 0 24 24">
                        <path stroke-linecap="round" 
                              stroke-linejoin="round" 
                              stroke-width="2" 
                              d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
                    </svg>
                    <span id="feedbackCopiar" 
                          class="absolute -top-10 right-0 text-xs text-green-400 opacity-0 transition-all duration-300 pointer-events-none whitespace-nowrap">
                        ✓ OK!
                    </span>
                </button>
            </div>
         
        </div>

        
        <div class="flex flex-col sm:flex-row justify-center gap-3 sm:gap-4 w-full">
            <a href="universe.html" 
               target="_blank" 
               class="bg-white hover:bg-gray-200 text-black font-semibold px-6 sm:px-8 py-3 rounded-xl transition duration-300 w-full sm:w-auto touch-target haptic-feedback text-center">
                Explore 
            </a>
            <a href="mailto:moneroverse@proton.me" 
               class="border border-gray-700 hover:border-orange-600 hover:text-orange-500 text-white font-semibold px-6 sm:px-8 py-3 rounded-xl transition duration-300 w-full sm:w-auto touch-target haptic-feedback text-center">
                Contact Us
            </a>
        </div>


        <div class="pt-6 sm:pt-12 flex justify-center space-x-8 sm:space-x-6 text-gray-500 text-sm">
            <a href="https://codeberg.org/Moneroverse/Moneroverse" 
               target="_blank" 
               class="hover:text-orange-500 transition touch-target haptic-feedback">
                <i class="fab fa-github text-2xl sm:text-2xl"></i>
                <span class="sr-only">Codeberg</span>
            </a>
            
            <a href="https://twitter.com/moneroverse" 
               target="_blank" 
               class="hover:text-orange-500 transition touch-target haptic-feedback">
                <i class="fa-brands fa-x-twitter text-2xl sm:text-2xl"></i>
                <span class="sr-only">X</span>
            </a>
        </div>
    </div>

    <script>
    function copiarChave() {
        const texto = document.getElementById('chaveCopiar').textContent.trim();
        const feedback = document.getElementById('feedbackCopiar');
        const btn = event.currentTarget;
        const svg = btn.querySelector('svg');
        

        const textoLimpo = texto.replace(/\s+/g, ' ').trim();
        
        
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(textoLimpo).then(() => {
                mostrarFeedback(feedback, svg);
            }).catch(() => {
                copiarFallback(textoLimpo, feedback, svg);
            });
        } else {
            copiarFallback(textoLimpo, feedback, svg);
        }
    }

    function mostrarFeedback(feedback, svg) {
        feedback.classList.remove('opacity-0');
        feedback.classList.add('opacity-100');
        if (svg) {
            svg.classList.add('text-green-400');
            svg.classList.remove('text-gray-400');
        }
        
        setTimeout(() => {
            feedback.classList.remove('opacity-100');
            feedback.classList.add('opacity-0');
            if (svg) {
                svg.classList.remove('text-green-400');
                svg.classList.add('text-gray-400');
            }
        }, 2000);
    }

    function copiarFallback(texto, feedback, svg) {
    
        const tempInput = document.createElement('input');
        tempInput.value = texto;
        tempInput.style.position = 'fixed';
        tempInput.style.opacity = '0';
        tempInput.style.pointerEvents = 'none';
        document.body.appendChild(tempInput);
        tempInput.select();
        
        try {
            document.execCommand('copy');
            mostrarFeedback(feedback, svg);
        } catch (err) {
           
            const codeElement = document.getElementById('chaveCopiar');
            const range = document.createRange();
            range.selectNode(codeElement);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            
          
            feedback.textContent = '✓ Selecione e copie';
            feedback.classList.remove('opacity-0');
            feedback.classList.add('opacity-100');
            setTimeout(() => {
                feedback.classList.remove('opacity-100');
                feedback.classList.add('opacity-0');
                feedback.textContent = '✓ Copiado!';
            }, 3000);
        }
        
        document.body.removeChild(tempInput);
    }

    
    document.getElementById('chaveCopiar').addEventListener('click', function(e) {
        
        e.stopPropagation();
        copiarChave.call(this);
    });

    
    document.querySelectorAll('.touch-optimized').forEach(el => {
        el.addEventListener('touchstart', function(e) {
      
            if (this.id !== 'chaveCopiar') {
                e.preventDefault();
            }
        }, { passive: true });
    });
    </script>
</body>
</html>
