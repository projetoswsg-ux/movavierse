        function updateTank(delta) {
            if (!tankState || tankState.done) return;
            const t = tankState;
            t.timer += delta;

            const speed = 6.0;

            switch (t.phase) {
                case 'advance': {
                    const targetX = t.advanceX;
                    const dx = targetX - t.group.position.x;
                    if (Math.abs(dx) > 0.1) {
                        const step = Math.sign(dx) * speed * delta;
                        t.group.position.x += step;
                    } else {
                        t.group.position.x = targetX;
                        t.phase = 'aim';
                        t.timer = 0;
                    }
                    break;
                }
                case 'aim': {
                    if (t.timer > 0.6) {
                        t.phase = 'fire';
                        t.timer = 0;
                        const startPos = t.group.position.clone();
                        startPos.y += 0.6;
                        const dir = new THREE.Vector3().subVectors(t.targetPos, startPos);
                        dir.y += 0.5;
                        dir.normalize();
                        const angle = Math.atan2(dir.x, dir.z);
                        t.turretGroup.rotation.y = angle;
                        const proj = new NukeProjectile(startPos, t.targetPos, t.side);
                        t.projectile = proj;
                        t.fired = true;
                        t.cannon.position.z = 0.30;
                        setTimeout(() => { if (t.cannon) t.cannon.position.z = 0.35; }, 100);
                    }
                    break;
                }
                case 'fire': {
                    if (t.projectile && !t.projectile.alive) {
                        t.phase = 'retreat';
                        t.timer = 0;
                    }
                    if (t.timer > 3.0) {
                        t.phase = 'retreat';
                        t.timer = 0;
                    }
                    break;
                }
                case 'retreat': {
                    const targetX = t.retreatX;
                    const dx = targetX - t.group.position.x;
                    if (Math.abs(dx) > 0.1) {
                        const step = Math.sign(dx) * speed * delta * 0.8;
                        t.group.position.x += step;
                        t.group.position.z += Math.sin(t.timer * 10) * 0.002;
                    } else {
                        t.group.position.x = targetX;
                        t.phase = 'done';
                        t.done = true;
                        setTimeout(() => {
                            if (t.group.parent) scene.remove(t.group);
                            tankState = null;
                        }, 500);
                    }
                    break;
                }
                case 'done':
                    break;
            }
        }

        // ================================================================
        // 18. AMBIENTE DINÂMICO
        // ================================================================
        function adjustByVariation(variation) {
            currentVariation = variation;
            const clamped = Math.max(-10, Math.min(10, variation));
            const ratio = 0.5 + (clamped / 20);
            const total = INITIAL_SOLDIERS * 2;
            let greenTarget = Math.round(ratio * total);
            let redTarget = total - greenTarget;
            greenTarget = Math.max(MIN_SOLDIERS, Math.min(MAX_SOLDIERS, greenTarget));
            redTarget = Math.max(MIN_SOLDIERS, Math.min(MAX_SOLDIERS, redTarget));
            if (greenTarget + redTarget > total) {
                if (greenTarget > MIN_SOLDIERS) greenTarget--;
                else redTarget--;
            } else if (greenTarget + redTarget < total) {
                if (greenTarget < MAX_SOLDIERS) greenTarget++;
                else redTarget++;
            }
            greenTargetCount = greenTarget;
            redTargetCount = redTarget;

            let greenAlive = greenSoldiers.filter(s => s.alive).length;
            let redAlive = redSoldiers.filter(s => s.alive).length;

            while (greenAlive < greenTarget) { spawnSoldierAtCastleTop('green');
                greenAlive++; }
            while (greenAlive > greenTarget) {
                for (let i = greenSoldiers.length - 1; i >= 0; i--) {
                    if (greenSoldiers[i].alive) {
                        const s = greenSoldiers[i];
                        s.alive = false;
                        scene.remove(s.group);
                        greenAlive--;
                        break;
                    }
                }
            }
            while (redAlive < redTarget) { spawnSoldierAtCastleTop('red');
                redAlive++; }
            while (redAlive > redTarget) {
                for (let i = redSoldiers.length - 1; i >= 0; i--) {
                    if (redSoldiers[i].alive) {
                        const s = redSoldiers[i];
                        s.alive = false;
                        scene.remove(s.group);
                        redAlive--;
                        break;
                    }
                }
            }

            const allSoldiers = [...greenSoldiers, ...redSoldiers];
            for (const soldier of allSoldiers) {
                if (soldier.alive) soldier.recalculateStats(variation);
            }

            updateCountsAndHUD();

            if (variation > 0.1 && Math.random() < 0.015) {
                const notional = 100000 + Math.random() * 900000;
                triggerWhale({ side: 'buy' }, notional);
            } else if (variation < -0.1 && Math.random() < 0.015) {
                const notional = 100000 + Math.random() * 900000;
                triggerWhale({ side: 'sell' }, notional);
            }

            const strength = clamped / 10;
            const topColor = new THREE.Color(0x0a2a5a).lerp(new THREE.Color(0x4a2a0a), Math.max(0, strength));
            const bottomColor = new THREE.Color(0x7ab8e6).lerp(new THREE.Color(0xff8844), Math.max(0, strength));
            if (strength < 0) {
                topColor.lerp(new THREE.Color(0x1a0a0a), -strength);
                bottomColor.lerp(new THREE.Color(0x0a0a1a), -strength);
            }
            skyMat.uniforms.topColor.value.copy(topColor);
            skyMat.uniforms.bottomColor.value.copy(bottomColor);

            const intensity = 1.2 + strength * 0.6;
            sunLight.intensity = Math.max(0.4, intensity);
            const sunColor = new THREE.Color(0xffeedd).lerp(new THREE.Color(0xffaa44), Math.max(0, strength));
            sunLight.color.copy(sunColor);

            const coin = moneroCoin.userData.coin;
            const glow = moneroCoin.userData.glow;
            const light = moneroCoin.userData.light;
            const rim = moneroCoin.userData.rim;
            const brightness = 0.6 + strength * 0.8;
            coin.material.emissiveIntensity = Math.max(0.1, brightness * 0.3);
            glow.material.opacity = 0.4 + strength * 0.4;
            light.intensity = 1.0 + strength * 1.2;
            rim.material.emissiveIntensity = 0.2 + strength * 0.6;
            const coinColor = new THREE.Color(0xff8800).lerp(new THREE.Color(0xffdd44), Math.max(0, strength));
            coin.material.emissive.copy(coinColor);
            rim.material.emissive.copy(coinColor);

            const lavaBright = 0.5 + strength * 0.5;
            lavaRiver.lavaMesh.material.color.setHSL(0.07, 1, 0.3 + lavaBright * 0.3);
            lavaRiver.glow.material.opacity = 0.3 + strength * 0.4;
        }

        // ================================================================
        // 19. HUD
        // ================================================================
        function updateHUD(price, variation, greenCount, redCount) {
            document.getElementById('priceDisplay').textContent = price.toFixed(2);
            const varEl = document.getElementById('variationDisplay');
            if (variation > 0.1) {
                varEl.textContent = '+' + variation.toFixed(2) + '%';
                varEl.className = 'hud-variation up';
            } else if (variation < -0.1) {
                varEl.textContent = variation.toFixed(2) + '%';
                varEl.className = 'hud-variation down';
            } else {
                varEl.textContent = variation.toFixed(2) + '%';
                varEl.className = 'hud-variation stable';
            }
            document.getElementById('greenCount').textContent = greenCount;
            document.getElementById('redCount').textContent = redCount;
            const total = greenCount + redCount;
            if (total > 0) {
                const greenPct = (greenCount / total) * 100;
                const redPct = (redCount / total) * 100;
                document.getElementById('greenBarFill').style.width = greenPct + '%';
                document.getElementById('redBarFill').style.width = redPct + '%';
            }
            const statusEl = document.getElementById('statusText');
            if (variation > 0.5) {
                statusEl.textContent = 'GREEN · DOMINATES';
                statusEl.style.color = 'rgba(76, 175, 80, 0.7)';
            } else if (variation < -0.5) {
                statusEl.textContent = 'RED · DOMINATES';
                statusEl.style.color = 'rgba(244, 67, 54, 0.7)';
            } else if (Math.abs(variation) > 0.1) {
                statusEl.textContent = 'Trending ' + (variation > 0 ? 'GREEN' : 'RED');
                statusEl.style.color = 'rgba(255, 170, 0, 0.6)';
            } else {
                statusEl.textContent = 'Evenly matched · battle';
                statusEl.style.color = 'rgba(255, 170, 0, 0.5)';
            }
        }

        // ================================================================
        // 20. WEBSOCKET BINANCE + CONTROLE DE LOADING
        // ================================================================
        let currentPrice = 0;
        let binanceReady = false;

        const socket = new WebSocket('wss://fstream.binance.com/market/ws/xmrusdt@ticker');

        socket.onopen = () => {
            console.log('🟢 WebSocket Ticker conectado - XMR/USDT');
        };
        socket.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                const price = parseFloat(data.c);
                const changePercent = parseFloat(data.P);
                if (!isNaN(price) && price > 0) {
                    currentPrice = price;
                    let variation = !isNaN(changePercent) ? changePercent : currentVariation || 0;
                    const greenAlive = greenSoldiers.filter(s => s.alive).length;
                    const redAlive = redSoldiers.filter(s => s.alive).length;
                    updateHUD(currentPrice, variation, greenAlive, redAlive);
                    adjustByVariation(variation);
                }
                if (!binanceReady) {
                    binanceReady = true;
                    checkLoadingComplete();
                }
            } catch (e) { console.error('Error:', e); }
        };
        socket.onerror = (err) => console.error('❌ WebSocket error:', err);
        socket.onclose = () => {
            console.log('🔴 WebSocket fechado. Tentando reconectar em 5s...');
            setTimeout(() => window.location.reload(), 5000);
        };

        // ================================================================
        // 20.1 FUNÇÃO DE CARREGAMENTO COMPLETO
        // ================================================================
        let loadingComplete = false;
        let musicStarted = false;

        function checkLoadingComplete() {
            const textureReady = moneroCoin.userData && moneroCoin.userData.textureLoaded === true;
            if (textureReady && binanceReady && !loadingComplete) {
                loadingComplete = true;
                const loadingScreen = document.getElementById('loadingScreen');
                loadingScreen.classList.add('hidden');
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                }, 1000);
                console.log('✅ Loading completo – Tela removida.');

                // ===== ATIVA ÁUDIO E MÚSICA =====
                if (!musicStarted) {
                    musicStarted = true;
                    audioEnabled = true; // ⬅️ HABILITA TODOS OS SONS
                    initAudio(); // cria o contexto, se ainda não existir
                    initExplosionAudio();
                    tryPlayMusic();
                }
            }
        }

        // Fallback
        setTimeout(() => {
            if (!loadingComplete) {
                console.warn('⏱️ Timeout de loading – forçando exibição.');
                const loadingScreen = document.getElementById('loadingScreen');
                loadingScreen.classList.add('hidden');
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                }, 1000);
                loadingComplete = true;
                if (!musicStarted) {
                    musicStarted = true;
                    audioEnabled = true;
                    initAudio();
                    initExplosionAudio();
                    tryPlayMusic();
                }
            }
        }, 8000);

        // ================================================================
        // 21. LOOP PRINCIPAL
        // ================================================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const now = performance.now() / 1000;

            if (shakeIntensity > 0.01) {
                shakeOffset.set(
                    (Math.random() - 0.5) * shakeIntensity * 0.8,
                    (Math.random() - 0.5) * shakeIntensity * 0.5,
                    (Math.random() - 0.5) * shakeIntensity * 0.3
                );
                shakeIntensity *= shakeDecay;
                if (shakeIntensity < 0.01) {
                    shakeIntensity = 0;
                    shakeOffset.set(0, 0, 0);
                }
                updateCamera();
            }

            const time = now * 1.5;
            if (fortressGreen.userData.flag) {
                fortressGreen.userData.flag.rotation.z = Math.sin(time) * 0.15;
                fortressGreen.userData.flag.position.y = 3.0 + Math.sin(time * 1.3) * 0.05;
            }
            if (fortressRed.userData.flag) {
                fortressRed.userData.flag.rotation.z = Math.sin(time + 0.8) * 0.15;
                fortressRed.userData.flag.position.y = 3.0 + Math.sin(time * 1.3 + 0.8) * 0.05;
            }

            moneroCoin.rotation.y += delta * 0.6;
            const yBase = getTerrainHeight(0, 0);
            moneroCoin.position.y = yBase + 1.8 + Math.sin(now * 0.5) * 0.12;

            lavaRiver.particles.rotation.y += delta * 0.015;
            for (const c of clouds) {
                c.sprite.position.x += c.speed * c.dir * delta * 0.8;
                if (c.sprite.position.x > c.range) c.sprite.position.x = -c.range;
                if (c.sprite.position.x < -c.range) c.sprite.position.x = c.range;
            }

            for (const soldier of greenSoldiers) if (soldier.alive) soldier.update(delta, now);
            for (const soldier of redSoldiers) if (soldier.alive) soldier.update(delta, now);
            resolveSoldierCollisions();

            for (let i = projectiles.length - 1; i >= 0; i--) {
                const proj = projectiles[i];
                proj.update(delta);
                if (!proj.alive) projectiles.splice(i, 1);
            }

            if (tankState) {
                updateTank(delta);
                if (tankState.projectile) {
                    tankState.projectile.update(delta);
                    if (!tankState.projectile.alive) {
                        tankState.projectile = null;
                    }
                }
            }

            renderer.render(scene, camera);
        }

        // ================================================================
        // 22. INICIALIZAÇÃO
        // ================================================================
        initSoldiers();
        animate();

        // ================================================================
        // 23. ÁUDIO DA BATALHA (SÓ INICIA APÓS LOADING)
        // ================================================================
        const battleMusic = document.getElementById('battleMusic');
        battleMusic.volume = 0.5;

        function tryPlayMusic() {
            battleMusic.play().catch(() => {
                const playOnInteraction = () => {
                    battleMusic.play().catch(e => console.log('Áudio ainda bloqueado:', e));
                    document.removeEventListener('click', playOnInteraction);
                    document.removeEventListener('touchstart', playOnInteraction);
                };
                document.addEventListener('click', playOnInteraction, { once: true });
                document.addEventListener('touchstart', playOnInteraction, { once: true });
            });
        }

        // ================================================================
        // 24. RESIZE
        // ================================================================
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        console.log('⚔️ XMR BATTLE · Tanque Nuke ativado!');
        console.log('📊 Conectado ao WebSocket XMR/USDT da Binance');
        console.log('💥 Tanque surge, avança até a beira do rio, dispara e recua de ré!');
        console.log('🌞 Tela de loading ativa – aguardando textura e cotação.');
        console.log('🔊 Sons e música só serão ativados após o loading completo.');
    </script>
</body>
